<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Landing Page</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-white font-sans">
    <header class="flex justify-between items-center p-6">
        <h1 class="text-2xl font-bold">Trabook<img src="Vector.png" alt=""></h1>
        <nav class="space-x-6 hidden md:flex">
            <a href="#" class="text-gray-600 hover:text-black">Home</a>
            <a href="#" class="text-gray-600 hover:text-black">About</a>
            <a href="#" class="text-gray-600 hover:text-black">Destination</a>
            <a href="#" class="text-gray-600 hover:text-black">Tour</a>
            <a href="#" class="text-gray-600 hover:text-black">Blog</a>
        </nav>
        <div class="space-x-4">
            <button class="text-orange-500">Login</button>
            <button class="bg-orange-500 text-white px-4 py-2 rounded-lg">Sign up</button>
        </div>
    </header>
    
    <section class="flex flex-col md:flex-row items-center p-10">
        <div class="md:w-1/2 space-y-6">
            <h2 class="text-5xl font-bold leading-tight">
                Get started your <span class="text-orange-500">exciting journey</span> with us.
            </h2>
            <p class="text-gray-600">
                A team of experienced tourism professionals will provide you 
                with the best advice and tips for your desired place.
            </p>
            <button class="bg-orange-500 text-white px-6 py-3 rounded-lg">Discover Now</button>
        </div>
        
        <div class="md:w-1/2 relative mt-10 md:mt-0">
            <img src="tourist.png" alt="Traveler" class="rounded-lg shadow-lg">
            <div class="absolute top-10 right-10 bg-white p-2 rounded-lg shadow-lg">
            </div>
            <div class="absolute bottom-10 left-10 bg-white p-2 rounded-lg shadow-lg">
   
            </div>
        </div>
    </section>
    
    <section class="p-10 bg-gray-100 rounded-lg mx-10 mt-10">
        <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
            <input type="Text" placeholder=" Location"class="p-4 w-full border rounded-lg">
            <input type="date" class="p-4 w-full border rounded-lg">
            <input type="number▼" placeholder="Guest" class="p-4 w-full border rounded-lg">
            <button class="bg-orange-500 text-white px-6 py-3 rounded-lg">Explore Now</button>
        </div>
    </section>
</body>
</html>
